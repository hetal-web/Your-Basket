<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="basket.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("bg.jpg");
      background-size: cover;
    }

    #cart-list {
      list-style-type: none;
      padding: 0;
    }

    .cart-page {
      background-color: #2c2c81;
      color: white;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: underline;
      box-shadow: 0px 5px 5px rgb(108, 106, 106);
    }

    #cart-list li {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #ccc;
      color: #2c2c81;
      font-size: larger;
      background-color: white;
    }

    button {
      background-color: #2c2c81;
      color: white;
      border: white 1px solid;
      border-radius: 5px;
      cursor: pointer;
      padding: 5px 10px;
    }

    button:hover {
      background-color: #1f1f61;
    }

    #clear-cart {
      margin-top: 20px;
      display: block;
      width: 100px;
      background-color: #ff4d4d;
    }
  </style>
</head>

<body>
  <div class="cart-page">
    <h1>Your Cart</h1>
  </div>
  <div class="cart-li">
    <ul id="cart-list"></ul>
    <button id="clear-cart">Clear Cart</button>
  </div>

  <script>
   document.addEventListener("DOMContentLoaded", function () {
    const cartList = document.getElementById("cart-list");
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    // Populate the cart list
    cart.forEach((productWithQuantity) => {
        const li = document.createElement("li");
        li.textContent = productWithQuantity; // Display product with quantity

        const removeButton = document.createElement("button");
        removeButton.textContent = "Remove";
        removeButton.addEventListener("click", function () {
            const index = cart.indexOf(productWithQuantity);
            cart.splice(index, 1); // Remove product from cart
            localStorage.setItem("cart", JSON.stringify(cart)); // Update local storage
            li.remove(); // Remove from the list
        });

        li.appendChild(removeButton);
        cartList.appendChild(li);
    });

    // Clear the cart functionality
    document.getElementById("clear-cart").addEventListener("click", function () {
        localStorage.removeItem("cart"); // Clear local storage
        cartList.innerHTML = ""; // Clear the displayed cart
    });
});


  </script>
</body>

</html>
