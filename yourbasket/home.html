<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
</head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
nav {
    background-color: #2c2c81;
    padding: 15px;
}

nav ul {
    list-style: none;
    display: flex;
    /* justify-content: flex-end; */
}

nav ul li {
    margin-left: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-size: 18px;
}

nav ul li a:hover {
    color:#f0a500;
}
.hero-content{
    padding-top: 150px;
}
.hero {
    background-image: url(bg.jpg);
    background-size: cover;
    background-position: center;
    height: calc(100vh - 40px); 
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
   
}

.hero-content h1 {
    font-size: 100px;
    color: white;
    margin-bottom: 20px;
    text-shadow: 3px 3px 5px rgba(0, 0, 0, 1);
}
.hero-btn{
    padding-top: 100px;
}
.hero-content p {
    font-size: 20px;
    color: white;
    margin-bottom: 20px;
    text-shadow: 3px 3px 5px rgba(0, 0, 0, 1);
}
.btn {
    padding: 15px 30px;
    background-color: #2c2c81;
    color: white;
    font-size: 18px;
    text-decoration: none;
    border-radius: 30px;
}
 .btn:hover {
    background-color: rgb(31, 31, 78);
    border: 2px solid #7c7c92; 
}
footer {
    text-align: center; 
    font-size: smaller; 
    color: #666; 
    padding-top: 100px;
}
</style>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Your Basket</h1>
            <p>Your Basket, Your Way — Simplify Grocery Shopping Like Never Before.</p>
            
        </div>
        <div class="hero-btn"><a href="basket.html" class="btn">Get Started <i class="fa-solid fa-angles-right"></i></a></div>
        <footer>
            <p>&copy; 2024 Your Basket. All rights reserved.</p>
          </footer>
    </section>
    

</body>
</html>
